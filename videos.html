<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebo Earn Videos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="videos.css" rel="stylesheet">
     <link rel="icon" href="images/Logo design for 'Leb2.png">
</head>
<body>
    <div class="container py-4">
        <h4 class="fw-bold mb-3">Watch Video & Earn </h4>
        <div class="card p-3">
            <div class="ratio ratio-16*9 mb-3">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
            <button id="startBtn" class="btn btn-primary w-100">Start Watching</button>
            <button id="claimBtn" class="btn btn-success w-100 mt-2 d-none">Claim Reward</button>
            <p id="timer" class="text-center mt-2 text-muted"></p>

        </div>
    </div>

    <nav class="nav-bottom d-flex justify-content-around py-2">
  <a href="dashboard.html" class="active">Dashboard</a>
  <a href="videos.html">Videos</a>
  <a href="article.html">Articles</a>
  <a href="withdraw.html">Withdraw</a>
</nav>
    <script>
       let time = 30;
let interval;

document.getElementById('startBtn').onclick = () => {
  interval = setInterval(() => {
    time--;
    document.getElementById('timer').innerText = `Watching... ${time}s remaining`;
    if (time <= 0) {
      clearInterval(interval);
      document.getElementById('claimBtn').classList.remove('d-none');
      document.getElementById('timer').innerText = 'You can now claim your reward';
    }
  }, 1000);
}; 
    </script>
</body>
</html>
