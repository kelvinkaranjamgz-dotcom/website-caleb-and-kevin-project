<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeboEarn Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #0d6efd;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .container {
      padding: 1rem;
      max-width: 500px;
      margin: auto;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #0b5ed7;
    }
    h3, p {
      margin: 0.5rem 0;
    }
    .flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>LeboEarn Dashboard</h1>
  </header>

  <div class="container">
    <!-- Wallet Card -->
    <div class="card">
      <div class="flex">
        <h3>Wallet Balance:</h3>
        <span id="wallet">KES 0</span>
      </div>
      <div class="flex">
        <button onclick="earnVideo()">Watch & Earn</button>
        <button onclick="withdraw()">Withdraw</button>
      </div>
    </div>

    <!-- Referral Card -->
    <div class="card">
      <h3>Referral Code:</h3>
      <p id="referralCode">Loading...</p>
      <p>Share this code to earn 15% of your referrals' registration fee.</p>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000";
    const userId = 1; // temporary, replace with JWT user data later

    // Get wallet balance and referral
    async function getWallet() {
      try {
        const res = await fetch(`${API_URL}/api/user/${userId}`);
        const data = await res.json();
        document.getElementById("wallet").innerText = `KES ${data.wallet}`;
        document.getElementById("referralCode").innerText = data.referral_code;
      } catch (err) {
        console.error(err);
      }
    }

    // Earn video
    async function earnVideo() {
      try {
        await fetch(`${API_URL}/api/earn/video`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId })
        });
        getWallet();
      } catch (err) {
        console.error(err);
      }
    }

    // Withdraw money (prompt for amount and phone)
    async function withdraw() {
      const amount = prompt("Enter amount to withdraw:");
      const phone = prompt("Enter your phone number:");
      if (!amount || !phone) return alert("Amount and phone required!");

      try {
        const res = await fetch(`${API_URL}/api/withdraw`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, amount, phone })
        });
        const data = await res.json();
        alert(data.message);
        getWallet();
      } catch (err) {
        console.error(err);
      }
    }

    // Initial load
    getWallet();
  </script>
</body>
</html>
